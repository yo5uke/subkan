name: Release APK

# バージョンタグ（例: v1.0.0）を push すると、APK を自動ビルドして
# GitHub Releases に添付します。
on:
  push:
    tags:
      - 'v*'
  # 手動実行も可能（Actions タブから Run workflow）
  workflow_dispatch:

# Releases を作成・更新するために書き込み権限が必要
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/SubKan-${{ github.ref_name }}.apk"

      - name: Publish to GitHub Releases
        # タグ push 時のみリリースを作成（手動実行ではビルド確認のみ）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SubKan-${{ github.ref_name }}.apk
          generate_release_notes: true

      - name: Upload APK as build artifact
        # 手動実行（タグ無し）でも成果物を確認できるようにする
        uses: actions/upload-artifact@v4
        with:
          name: SubKan-apk
          path: dist/*.apk
